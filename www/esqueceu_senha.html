<!doctype html>

<html class="dark" lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Recuperar Palavra-passe - InfinityArt</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#f27f0d", // InfinityArt Orange
              "cosmic-blue": "#0a192f", // Cosmic Blue Brand Color
              "background-light": "#f8f7f5",
              "background-dark": "#0a192f",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="css/esqueceu_senha.css" />
    <link rel="stylesheet" href="css/mobile-flow.css" />
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col"
  >
    <!-- Top Navigation Bar (iOS Style) -->
    <header
      class="flex items-center justify-between p-4 sticky top-0 z-10 bg-background-light dark:bg-background-dark"
    >
      <button
        class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors"
      >
        <span
          class="material-symbols-outlined text-slate-900 dark:text-slate-100"
          >arrow_back_ios_new</span
        >
      </button>
      <div class="flex-1"></div>
    </header>
    <main
      class="flex-1 flex flex-col items-center px-6 pt-4 pb-12 w-full max-w-md mx-auto"
    >
      <!-- Logo Section -->
      <div class="mb-10 flex flex-col items-center">
        <div class="relative group">
          <!-- Outer glow effect for the logo -->
          <div
            class="absolute -inset-1 bg-primary/20 rounded-full blur-md group-hover:bg-primary/30 transition-all"
          ></div>
          <div
            class="relative bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 border-2 border-primary/20 bg-slate-800 flex items-center justify-center overflow-hidden"
            data-alt="Circular InfinityArt brand logo with artistic graphics"
            style="
              background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuA9ledvnCkMiD7ZBtRk3Nz4lj1BT8BmLOI0AXSIb5rm_B4Av9R5saLpat5rSXKGJoJNdCTUb_0lsG8hyl4CIfgA0Y3m9Kn0Jo2HQz1cAYIxZDDLD58un3eIf-mPby3dVRORnf9yYJeGRPb9K11LwBrO1MEvz79QNiOrldQnfllP4sVtABYvsmmMIu50XHi5K7MeCEX5Pbk9AsXI_CnEal3UHrtUg4CyG15uPEEgJke6bnfj4_iTkrq0x8TmmUpxrkMUdArCWyaa88Tv&quot;);
            "
          ></div>
        </div>
      </div>
      <!-- Header Content -->
      <div class="text-center mb-10 space-y-3">
        <h1
          class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white"
        >
          Recuperar Palavra-passe
        </h1>
        <p
          class="text-slate-600 dark:text-slate-400 text-base leading-relaxed max-w-[280px] mx-auto"
        >
          Introduza o seu e-mail para receber as instruções de reposição
        </p>
      </div>
      <!-- Form Section -->
      <form class="w-full space-y-6">
        <div class="flex flex-col gap-2">
          <label
            class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1"
            for="email"
          >
            E-mail
          </label>
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl"
            >
              mail
            </span>
            <input
              class="form-input flex w-full rounded-xl pl-12 pr-4 py-4 text-slate-900 dark:text-white bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500"
              id="email"
              name="email"
              placeholder="nome@exemplo.com"
              required=""
              type="email"
            />
          </div>
        </div>
        <div class="pt-2">
          <button
            class="w-full flex items-center justify-center rounded-xl h-14 bg-primary hover:bg-primary/90 text-white text-lg font-bold shadow-lg shadow-primary/20 active:scale-[0.98] transition-all"
            type="submit"
          >
            <span>Enviar Instruções
          </button>
        </div>
      </form>
      <!-- Footer Actions -->
      <div class="mt-auto pt-12 text-center">
        <a
          class="inline-flex items-center gap-2 text-primary dark:text-primary font-medium hover:underline active:opacity-70 transition-all"
          href="index.html"
        >
          <span class="material-symbols-outlined text-sm">login</span>
          <span>Voltar para Iniciar Sessão</span>
        </a>
      </div>
    </main>
    <!-- Visual Accent Element (Cosmic Theme) -->
    <div
      class="fixed bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-primary/40 to-transparent pointer-events-none"
    ></div>
    <script defer src="js/mobile-flow.js"></script>
  </body>
</html>
