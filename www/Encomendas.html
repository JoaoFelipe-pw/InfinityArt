<!doctype html>
<html class="dark" lang="pt-PT">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Seguir Encomenda - Grafica InfinityArt</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#FF8C00",
              "brand-blue": "#0A1F44",
              "background-light": "#f6f7f8",
              "background-dark": "#050B14",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="css/Encomendas.css" />
    <link rel="stylesheet" href="css/mobile-flow.css" />
  </head>
  <body class="bg-background-light dark:bg-background-dark text-white font-display antialiased">
    <div
      data-app-shell
      class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark max-w-[480px] mx-auto shadow-2xl overflow-x-hidden pb-24"
    >
      <div
        class="flex items-center bg-background-light dark:bg-brand-blue p-4 pb-4 justify-between sticky top-0 z-20 border-b border-gray-200 dark:border-white/10"
      >
        <div class="text-gray-900 dark:text-white flex size-10 shrink-0 items-center cursor-pointer">
          <span class="material-symbols-outlined">arrow_back_ios</span>
        </div>
        <div class="flex flex-col items-center flex-1">
          <h2 class="text-gray-900 dark:text-white text-base font-bold leading-tight tracking-tight uppercase">Seguir Encomenda</h2>
          <p class="text-[10px] text-primary font-bold tracking-[0.2em] leading-none mt-1">INFINITY ART</p>
        </div>
      </div>

      <main class="px-4 py-5">
        <div class="rounded-2xl border border-gray-200 dark:border-white/10 bg-white dark:bg-brand-blue/30 p-4 text-sm text-gray-600 dark:text-gray-300">
          A carregar encomendas...
        </div>
      </main>
    </div>

    <nav
      class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-white/80 dark:bg-brand-blue/90 ios-tab-bar border-t border-gray-200 dark:border-white/10 px-6 py-3 flex items-center justify-between z-30"
    >
      <a href="Menu.html" class="flex flex-col items-center gap-1 group cursor-pointer">
        <span class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors">home</span>
        <span class="text-[10px] font-bold text-gray-400 group-hover:text-primary uppercase tracking-tighter">Inicio</span>
      </a>

      <a href="Encomendas.html" class="flex flex-col items-center gap-1 group cursor-pointer">
        <span class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors">shopping_bag</span>
        <span class="text-[10px] font-bold text-gray-400 group-hover:text-primary uppercase tracking-tighter">Encomendas</span>
      </a>

      <a href="Historico.html" class="flex flex-col items-center gap-1 group cursor-pointer">
        <span class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors">history</span>
        <span class="text-[10px] font-bold text-gray-400 group-hover:text-primary uppercase tracking-tighter">Historico</span>
      </a>

      <a href="Perfil.html" class="flex flex-col items-center gap-1 group cursor-pointer">
        <span class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors">person</span>
        <span class="text-[10px] font-bold text-gray-400 group-hover:text-primary uppercase tracking-tighter">Perfil</span>
      </a>
    </nav>

    <script defer src="js/mobile-flow.js"></script>
    <script defer src="js/auth-guard.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
    <script defer src="js/firebase-init.js"></script>
    <script defer src="js/customer-data.js"></script>
  </body>
</html>
