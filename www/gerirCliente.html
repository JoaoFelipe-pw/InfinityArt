<!doctype html>
<html class="dark" lang="pt-PT">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Gerir Cliente - InfinityArt</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#FF8C00",
              "brand-blue": "#0A1F44",
              "background-light": "#f6f7f8",
              "background-dark": "#050B14",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/gerirCliente.css" />
    <link rel="stylesheet" href="css/mobile-flow.css" />
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen"
  >
    <div
      data-app-shell
      class="relative flex min-h-screen w-full max-w-[430px] mx-auto flex-col overflow-x-hidden border-x border-slate-200 dark:border-slate-800 pb-24"
    >
      <header
        class="sticky top-0 z-20 flex items-center justify-between bg-background-light/95 dark:bg-background-dark/95 backdrop-blur px-4 py-3 border-b border-slate-200 dark:border-slate-800"
      >
        <button
          class="app-back-button flex size-10 items-center justify-center text-slate-900 dark:text-slate-100"
          type="button"
        >
          <span class="material-symbols-outlined">arrow_back_ios</span>
        </button>
        <div class="flex flex-col items-center">
          <span class="text-[10px] tracking-[0.2em] text-primary font-bold uppercase -mb-1">Area</span>
          <h1 class="text-base font-black uppercase tracking-tight text-slate-900 dark:text-white">Gerir Cliente</h1>
        </div>
        <a
          href="clientes.html"
          class="flex size-10 items-center justify-center text-slate-500 dark:text-slate-300"
          aria-label="Voltar para clientes"
        >
        </a>
      </header>

      <main class="flex-1 px-4 pt-5 space-y-4">
        <section class="rounded-2xl border border-slate-200 dark:border-white/10 bg-white dark:bg-[#151f2b] shadow-sm p-4">
          <div class="flex items-center gap-4">
            <div
              id="cliente-avatar"
              class="h-20 w-20 rounded-full border-2 border-primary bg-primary/10 text-primary flex items-center justify-center text-2xl font-black"
            >
              --
            </div>
            <div class="flex-1 min-w-0">
              <p id="cliente-nome-head" class="text-xl font-black tracking-tight text-slate-900 dark:text-white">A carregar...</p>
              <p id="cliente-email-head" class="text-sm font-medium text-primary truncate">-</p>
              <p id="cliente-meta-head" class="text-[11px] mt-1 uppercase tracking-wider text-slate-400 dark:text-slate-500">ID: -</p>
            </div>
          </div>
        </section>

        <section class="rounded-2xl border border-slate-200 dark:border-white/10 bg-white dark:bg-[#151f2b] p-4">
          <h2 class="section-title">Dados do cliente</h2>

          <form id="cliente-form" class="mt-3 space-y-3">
            <label class="block">
              <span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Nome</span>
              <input
                id="cliente-nome-input"
                class="mt-1 w-full rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-slate-900/40 px-3 py-2 text-sm"
                type="text"
                required
              />
            </label>

            <label class="block">
              <span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">E-mail</span>
              <input
                id="cliente-email-input"
                class="mt-1 w-full rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-slate-900/40 px-3 py-2 text-sm"
                type="email"
                required
              />
            </label>

            <div class="grid grid-cols-2 gap-3">
              <label class="block">
                <span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Total gasto (EUR)</span>
                <input
                  id="cliente-totalgasto-input"
                  class="mt-1 w-full rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-slate-900/40 px-3 py-2 text-sm"
                  type="number"
                  min="0"
                  step="0.01"
                  readonly
                />
              </label>

              <label class="block">
                <span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Estado</span>
                <select
                  id="cliente-ativo-input"
                  class="mt-1 w-full rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-slate-900/40 px-3 py-2 text-sm"
                >
                  <option value="true">Ativo</option>
                  <option value="false">Inativo</option>
                </select>
              </label>
            </div>

            <button
              id="cliente-save-btn"
              class="w-full rounded-xl h-12 bg-primary text-white font-bold text-sm shadow-[0_4px_12px_rgba(249,115,22,0.4)]"
              type="submit"
            >
              Guardar alteracoes
            </button>
          </form>

          <p id="gerir-feedback" class="hidden mt-3 text-sm font-semibold text-slate-500 dark:text-slate-300"></p>
        </section>

        <section class="rounded-2xl border border-slate-200 dark:border-white/10 bg-white dark:bg-[#151f2b] p-4">
          <h2 class="section-title">Produtos e pedidos</h2>
          <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">
            Adicione aqui os produtos que o cliente pediu ou ainda vai pedir.
          </p>

          <form id="pedido-form" class="mt-3 space-y-3">
            <label class="block">
              <span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Produto</span>
              <input
                id="pedido-produto-input"
                class="mt-1 w-full rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-slate-900/40 px-3 py-2 text-sm"
                type="text"
                required
              />
            </label>

            <label class="block">
              <span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Descricao</span>
              <input
                id="pedido-descricao-input"
                class="mt-1 w-full rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-slate-900/40 px-3 py-2 text-sm"
                type="text"
                placeholder="Ex: 500 unidades, acabamento premium"
              />
            </label>

            <div class="grid grid-cols-2 gap-3">
              <label class="block">
                <span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Valor (EUR)</span>
                <input
                  id="pedido-valor-input"
                  class="mt-1 w-full rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-slate-900/40 px-3 py-2 text-sm"
                  type="number"
                  min="0"
                  step="0.01"
                  value="0"
                  required
                />
              </label>

              <label class="block">
                <span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Estado</span>
                <select
                  id="pedido-status-input"
                  class="mt-1 w-full rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-slate-900/40 px-3 py-2 text-sm"
                >
                  <option value="pendente">Pendente</option>
                  <option value="em_producao">Em producao</option>
                  <option value="em_transporte">Em transporte</option>
                  <option value="entregue">Entregue</option>
                </select>
              </label>
            </div>

            <button
              id="pedido-save-btn"
              class="w-full rounded-xl h-11 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold text-sm"
              type="submit"
            >
              Adicionar produto/pedido
            </button>
          </form>

          <p id="pedido-feedback" class="hidden mt-3 text-sm font-semibold text-slate-500 dark:text-slate-300"></p>

          <div class="mt-4 space-y-2" id="cliente-pedidos-list"></div>
          <p
            id="cliente-pedidos-empty"
            class="hidden mt-2 rounded-xl border border-slate-200 dark:border-white/10 bg-slate-50 dark:bg-slate-900/40 p-3 text-sm text-slate-500 dark:text-slate-300"
          >
            Este cliente ainda nao comprou nada na loja.
          </p>
        </section>
      </main>

      <nav
        class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white/85 dark:bg-brand-blue/90 border-t border-slate-200 dark:border-white/10 px-10 py-3 pb-6 flex items-center justify-between z-30"
      >
        <a href="Menu.html" class="flex flex-col items-center gap-1 app-tab-link">
          <span class="material-symbols-outlined text-slate-400">home</span>
          <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Inicio</span>
        </a>
        <a href="clientes.html" class="flex flex-col items-center gap-1 app-tab-link is-active">
          <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1">group</span>
          <span class="text-[10px] font-bold text-primary uppercase tracking-wide">Clientes</span>
        </a>
      </nav>
    </div>

    <script defer src="js/mobile-flow.js"></script>
    <script defer src="js/auth-guard.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
    <script defer src="js/firebase-init.js"></script>
    <script defer src="js/gerir-cliente.js"></script>
  </body>
</html>
