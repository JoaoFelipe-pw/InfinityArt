<!doctype html>
<html class="dark" lang="pt-PT">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Histórico de Compras - Grafica InfinityArt</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#FF8C00", // Brand Orange
              "brand-blue": "#0A1F44", // Deep Professional Blue
              "brand-light-blue": "#1E3A8A",
              "background-light": "#f6f7f8",
              "background-dark": "#050B14",
              "brandi-blue": "#0047AB",
              "brand-orange": "#FF8C00",
            },
            fontFamily: {
              display: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "1rem",
              full: "9999px",
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="css/Historico.css" />
    <link rel="stylesheet" href="css/mobile-flow.css" />
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display min-h-screen"
  >
    <header
      class="sticky top-0 z-50 bg-background-light/90 dark:bg-background-dark/90 ios-blur border-b border-slate-200 dark:border-slate-800"
    >
      <div class="flex items-center p-4 pb-2 justify-between">
        <div
          class="flex size-10 shrink-0 items-center justify-start text-brand-blue dark:text-brand-blue cursor-pointer"
        >
          <span class="material-symbols-outlined text-3xl">chevron_left</span>
        </div>
        <div class="flex-1 flex flex-col items-center">
          <h2
            class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight"
          >
            Histórico de Compras
          </h2>
          <p
            class="text-[10px] text-brand-orange font-bold uppercase tracking-widest"
          >
            InfinityArt
          </p>
        </div>
      </div>
    </header>
    <main class="max-w-md mx-auto pb-28">
      <div class="px-4 py-4">
        <label class="flex flex-col min-w-40 h-11 w-full">
          <div
            class="flex w-full flex-1 items-stretch rounded-xl h-full shadow-sm bg-white dark:bg-[#1A2633] border border-slate-200 dark:border-slate-800"
          >
            <div
              class="text-slate-400 dark:text-slate-500 flex items-center justify-center pl-4"
            >
              <span class="material-symbols-outlined text-xl">search</span>
            </div>
            <input
              id="historico-search"
              class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-r-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-0 border-none bg-transparent h-full placeholder:text-slate-400 dark:placeholder:text-slate-500 px-3 text-base font-normal leading-normal"
              placeholder="Pesquisar produtos..."
              value=""
            />
          </div>
        </label>
      </div>

      <div class="px-4 pt-4 pb-2">
        
        <h3
          class="text-slate-900 dark:text-white text-lg font-bold leading-tight flex items-center gap-2"
        >
          <span class="w-1 h-5 bg-brand-orange rounded-full"></span>
          Todas Encomendas
        </h3>
      </div>
      <div id="historico-list" class="flex flex-col px-4 gap-4"></div>
    </main>
    <nav
      class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-white/80 dark:bg-brand-blue/90 ios-tab-bar border-t border-gray-200 dark:border-white/10 px-6 py-3 flex items-center justify-between z-30"
    >
      <a
        href="Menu.html"
        class="flex flex-col items-center gap-1 group cursor-pointer"
      >
        <span
          class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors"
          >home</span
        >
        <span
          class="text-[10px] font-bold text-gray-400 group-hover:text-primary uppercase tracking-tighter"
          >Início</span
        >
      </a>

      <a
        href="Encomendas.html"
        class="flex flex-col items-center gap-1 group cursor-pointer"
      >
        <span
          class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors"
          >shopping_bag</span
        >
        <span
          class="text-[10px] font-bold text-gray-400 group-hover:text-primary uppercase tracking-tighter"
          >Encomendas</span
        >
      </a>

      <a
        href="Historico.html"
        class="flex flex-col items-center gap-1 group cursor-pointer"
      >
        <span
          class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors"
          >history</span
        >
        <span
          class="text-[10px] font-bold text-gray-400 group-hover:text-primary uppercase tracking-tighter"
          >Histórico</span
        >
      </a>

      <a
        href="Perfil.html"
        class="flex flex-col items-center gap-1 group cursor-pointer"
      >
        <span
          class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors"
          >person</span
        >
        <span
          class="text-[10px] font-bold text-gray-400 group-hover:text-primary uppercase tracking-tighter"
          >Perfil</span
        >
      </a>
    </nav>
    <script defer src="js/mobile-flow.js"></script>
    <script defer src="js/auth-guard.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
    <script defer src="js/firebase-init.js"></script>
    <script defer src="js/customer-data.js"></script>
  </body>
</html>
