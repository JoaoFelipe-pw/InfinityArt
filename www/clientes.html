<!doctype html>

<html class="dark" lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Gestão de Clientes InfinityArt</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#137fec",
              secondary: "#f97316",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
              "surface-dark": "#192633",
              "accent-dark": "#233648",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="css/clientes.css" />
    <link rel="stylesheet" href="css/mobile-flow.css" />
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display"
  >
    <div
      data-app-shell
      class="relative flex min-h-screen w-full max-w-[430px] mx-auto flex-col overflow-x-hidden border-x border-slate-200 dark:border-accent-dark pb-24"
    >
      <!-- Header Section -->
      <header
        class="sticky top-0 z-10 bg-background-light dark:bg-background-dark border-b border-slate-200 dark:border-accent-dark px-4 pb-4"
      >
        <div class="ios-status-bar w-full"></div>
        <div class="flex items-center justify-between py-2">
          <div class="flex items-center gap-3">
            <h1 class="text-xl font-bold tracking-tight">
              Clientes InfinityArt
            </h1>
          </div>
          <div class="app-logout-slot flex items-center"></div>
        </div>
        <!-- Search Bar -->
        <div class="mt-4">
          <label class="relative flex items-center h-12 w-full">
            <span
              class="material-symbols-outlined absolute left-4 text-slate-400"
              >search</span
            >
            <input
              id="clientes-search"
              class="w-full h-full rounded-xl border-none bg-slate-100 dark:bg-accent-dark pl-12 pr-4 text-base placeholder:text-slate-400 focus:ring-2 focus:ring-primary focus:outline-none"
              placeholder="Buscar por nome ou e-mail"
              type="text"
            />
          </label>
        </div>
        <!-- Filters -->
        <div class="flex gap-2 mt-4 overflow-x-auto pb-1 no-scrollbar">
          <button
            class="flex h-9 shrink-0 items-center justify-center rounded-full bg-primary px-5 text-sm font-semibold text-white"
          >
            Todos
          </button>
        </div>
      </header>
      <!-- Main Content: Customer List -->
      <main class="flex-1 px-4 py-4 space-y-3">
        <div class="flex items-center justify-between mb-2">
          <h3
            id="clientes-count"
            class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
          >
            Resultados (0)
          </h3>
          <span class="material-symbols-outlined text-slate-400 text-lg"
            >sort</span
          >
        </div>
        <div id="clientes-list" class="space-y-3"></div>
        <p
          id="clientes-empty"
          class="hidden rounded-xl border border-slate-200 dark:border-accent-dark bg-white dark:bg-surface-dark p-4 text-sm text-slate-500 dark:text-slate-300"
        >
          Nenhuma conta encontrada.
        </p>
      </main>
    </div>

    <nav
      class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white/90 dark:bg-surface-dark/95 backdrop-blur-xl border-t border-slate-200 dark:border-accent-dark px-8 py-3 pb-6 flex items-center justify-around z-30"
    >
      <a
        class="flex flex-col items-center gap-1 text-slate-400 app-tab-link"
        href="Menu.html"
      >
        <span class="material-symbols-outlined">dashboard</span>
        <span class="text-[10px] font-medium leading-none">Início</span>
      </a>
      <a
        class="flex flex-col items-center gap-1 text-primary app-tab-link is-active"
        href="clientes.html"
      >
        <span
          class="material-symbols-outlined text-primary"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >group</span
        >
        <span class="text-[10px] font-medium leading-none">Clientes</span>
      </a>
    </nav>
    <script defer src="js/mobile-flow.js"></script>
    <script defer src="js/auth-guard.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
    <script defer src="js/firebase-init.js"></script>
    <script defer src="js/clientes-list.js"></script>
  </body>
</html>
